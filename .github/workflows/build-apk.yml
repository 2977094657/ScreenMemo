name: Build APK (Debug Signing)

on:
  push:
    branches:
      - feature/activity-blacklist
  workflow_dispatch:

permissions:
  contents: read

jobs:
  android:
    name: Android APK Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.35.7"
          channel: stable
          cache: true

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        shell: bash
        run: |
          sdkmanager \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "ndk;27.0.12077973"

      - name: Generate debug keystore for signing
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p android/app

          keytool -genkeypair -v \
            -keystore android/app/upload-keystore.jks \
            -storetype PKCS12 \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -alias upload \
            -storepass android \
            -keypass android \
            -dname "CN=CI Builder, OU=Development, O=ScreenMemo, L=Unknown, ST=Unknown, C=US"

          CERT_SHA256="$(keytool -list -v -keystore android/app/upload-keystore.jks \
            -alias upload -storepass android -keypass android \
            | awk -F': ' '/SHA256/ { print tolower($2); exit }' \
            | sed 's/[^0-9a-f]//g')"

          {
            printf 'storePassword=%s\n' "android"
            printf 'keyPassword=%s\n' "android"
            printf 'keyAlias=%s\n' "upload"
            printf 'storeFile=upload-keystore.jks\n'
            printf 'certSha256=%s\n' "$CERT_SHA256"
          } > android/key.properties

          chmod 600 android/app/upload-keystore.jks android/key.properties

      - name: Derive build version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          if [[ "$VERSION" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+) ]]; then
            MAJOR="${BASH_REMATCH[1]}"
            MINOR="${BASH_REMATCH[2]}"
            PATCH="${BASH_REMATCH[3]}"
            BUILD_NUMBER=$((10#$MAJOR * 1000000 + 10#$MINOR * 1000 + 10#$PATCH))
          else
            VERSION="0.0.1-dev"
            BUILD_NUMBER="$(date +%Y%m%d%H%M)"
          fi

          echo "tag=ci-build" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Flutter clean
        run: flutter clean

      - name: Flutter pub get
        run: flutter pub get

      - name: Generate l10n
        run: flutter gen-l10n

      - name: Build APKs (split per ABI)
        shell: bash
        run: |
          flutter build apk --release --split-per-abi --tree-shake-icons --obfuscate --split-debug-info=build/symbols \
            --build-name="${{ steps.version.outputs.version }}" \
            --build-number="${{ steps.version.outputs.build_number }}"

      - name: Verify APK signing certificates
        shell: bash
        run: |
          set -euo pipefail

          apksigner="$ANDROID_HOME/build-tools/36.0.0/apksigner"

          shopt -s nullglob
          apks=(build/app/outputs/flutter-apk/*-release.apk)
          if (( ${#apks[@]} == 0 )); then
            echo "::error::No release APKs were produced."
            exit 1
          fi

          for apk in "${apks[@]}"; do
            actual="$("$apksigner" verify --print-certs "$apk" | awk -F': ' '/Signer #1 certificate SHA-256 digest/ { print tolower($2); exit }')"
            actual="$(printf '%s' "$actual" | tr '[:upper:]' '[:lower:]' | sed 's/[^0-9a-f]//g')"
            actual="${actual: -64}"
            echo "$(basename "$apk"): $actual"
            "$apksigner" verify --verbose "$apk" | head -3
            echo "---"
          done

      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p dist
          for apk in build/app/outputs/flutter-apk/*.apk; do
            base="$(basename "$apk")"
            cp "$apk" "dist/ci-${base}"
          done
          (cd build && zip -r "../dist/symbols-$(date +%Y%m%d).zip" symbols 2>/dev/null || true)
          if [[ -f "build/app/outputs/mapping/release/mapping.txt" ]]; then
            cp build/app/outputs/mapping/release/mapping.txt "dist/mapping-$(date +%Y%m%d).txt"
          fi

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: dist/*.apk
          compression-level: 0
          if-no-files-found: error

      - name: Upload symbols and mapping
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            dist/symbols-*.zip
            dist/mapping-*.txt
          compression-level: 9
          if-no-files-found: ignore
