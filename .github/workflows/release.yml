name: Release

on:
  push:
    branches-ignore:
      - "**"
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  android:
    name: Android APK Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.35.7"
          channel: stable
          cache: true

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        shell: bash
        run: |
          sdkmanager \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "ndk;27.0.12077973"

      - name: Parse tag version
        id: version
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Configure Android release signing (optional)
        shell: bash
        run: |
          if [[ -z "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]]; then
            echo "ANDROID_KEYSTORE_BASE64 is not set; skipping release signing config."
            exit 0
          fi

          mkdir -p android/app
          printf '%s' "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks

          {
            printf 'storePassword=%s\n' "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}"
            printf 'keyPassword=%s\n' "${{ secrets.ANDROID_KEY_PASSWORD }}"
            printf 'keyAlias=%s\n' "${{ secrets.ANDROID_KEY_ALIAS }}"
            printf 'storeFile=upload-keystore.jks\n'
          } > android/key.properties

          chmod 600 android/app/upload-keystore.jks android/key.properties

      - name: Flutter clean
        run: flutter clean

      - name: Flutter pub get
        run: flutter pub get

      - name: Generate l10n
        run: flutter gen-l10n

      - name: Build APKs (split per ABI)
        shell: bash
        run: |
          flutter build apk --release --split-per-abi --tree-shake-icons --obfuscate --split-debug-info=build/symbols \
            --build-name="${{ steps.version.outputs.version }}" \
            --build-number="${{ github.run_number }}"

      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p dist
          for apk in build/app/outputs/flutter-apk/*.apk; do
            base="$(basename "$apk")"
            cp "$apk" "dist/screen_memo-${{ steps.version.outputs.tag }}-${base}"
          done
          (cd build && zip -r "../dist/symbols-${{ steps.version.outputs.tag }}.zip" symbols)
          if [[ -f "build/app/outputs/mapping/release/mapping.txt" ]]; then
            cp build/app/outputs/mapping/release/mapping.txt "dist/mapping-${{ steps.version.outputs.tag }}.txt"
          fi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.version.outputs.tag }}
          tag_name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/*.apk
            dist/*.zip
            dist/*.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
